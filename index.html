<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lineup Legends</title>

<meta property="og:image:width" content="1200"/>
<meta property="og:image:height" content="630"/>
<meta property="og:site_name" content="Lineup Legends"/>

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:title" content="⚽ Lineup Legends — Can you guess the lineup?"/>
<meta name="twitter:description" content="Guess the famous football lineup. Challenge your mates and see who knows their football."/>
<meta name="twitter:image" content="https://lineuplegends.netlify.app/og-image.png"/>

<!-- Mobile app feel -->
<meta name="theme-color" content="#0d1b2a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Lineup Legends"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0D1B2A;--pitch:#0e3d1f;--lime:#B5FF4D;--lime2:#8de020;
  --white:#F0F4F8;--muted:#6b8caa;--wrong:#ff5c5c;
  --fh:'Barlow Condensed',sans-serif;--fb:'Inter',sans-serif;
}
html,body{
  height:100dvh;
  max-height:100dvh;
  overflow:hidden;
  background:var(--navy);
  color:var(--white);
  font-family:var(--fb);
  -webkit-tap-highlight-color:transparent;
}

#app{
  display:flex;
  flex-direction:column;
  height:100dvh;
  max-height:100dvh;
  overflow:hidden;
  width:100%;
  max-width:430px;
  margin:0 auto;
  background:var(--navy);
  position:relative;
}

/* Pitch fills 100% of #app width — no padding on pitch-wrap */

/* ── TOP CHROME ── */

/* Row 1: Logo + back button */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 12px 8px;
  border-bottom:1px solid rgba(255,255,255,0.07);
}
.logo{font-family:var(--fh);font-weight:800;font-size:1.5rem;line-height:1}
.logo span{color:var(--lime)}
#back-btn{
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);
  border-radius:8px;color:var(--muted);font-family:var(--fb);font-size:0.72rem;
  font-weight:600;padding:5px 11px;cursor:pointer;
}
#back-btn:active{background:rgba(255,255,255,0.14)}

/* Row 2: Score (hero) + puzzle info side by side */
#scorebar{
  display:flex;align-items:center;gap:12px;
  padding:8px 12px 7px;
  border-bottom:1px solid rgba(255,255,255,0.07);
}
#score-block{
  display:flex;flex-direction:column;align-items:flex-start;
  flex-shrink:0;
  border-right:1px solid rgba(255,255,255,0.08);
  padding-right:12px;
}
#score-num{
  font-family:var(--fh);font-size:3rem;font-weight:800;
  line-height:1;color:var(--lime);
  transition:color 0.3s;
}
#score-num.hit{color:#fff;text-shadow:0 0 20px var(--lime);}
@keyframes scoreUp{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
#score-lbl{font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;font-weight:700;margin-top:1px}
#score-meta{flex:1;min-width:0}
#ptitle{font-family:var(--fh);font-weight:700;font-size:1rem;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#hcomp{font-size:0.6rem;color:var(--muted);font-weight:500;letter-spacing:0.2px;margin-top:3px;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
#hints-used{font-size:0.62rem;color:var(--muted);font-weight:500;margin-top:1px}

/* Row 3: Progress bar only — no text label */
#prog-wrap{padding:0}
#prog-track{height:4px;background:rgba(255,255,255,0.1);overflow:hidden}
#prog-fill{height:100%;background:var(--lime);border-radius:0;width:0%;transition:width 0.5s cubic-bezier(.22,.68,0,1.2)}

/* Challenge banner */
#challenge-banner{
  display:none;margin:4px 10px 2px;
  background:rgba(255,180,0,0.12);border:1.5px solid rgba(255,180,0,0.35);
  border-radius:10px;padding:8px 12px;text-align:center;
}
#challenge-banner .cb-name{font-family:var(--fh);font-size:0.88rem;font-weight:800;color:rgba(255,210,80,0.95);line-height:1.3}
#challenge-banner .cb-score{font-size:0.65rem;color:rgba(255,255,255,0.55);margin-top:2px}
/* Pitch fills 100% of #app width — no padding on pitch-wrap */
#pitch-wrap{padding:2px 0;display:flex;justify-content:center;align-items:center;flex:1;min-height:0;overflow:hidden}
#pitch{
  position:relative;
  width:100%;
  aspect-ratio:68/105;
  overflow:visible;
  flex-shrink:1;
  min-height:0;
}
#pitch-bg{
  position:absolute;inset:0;
  background:var(--pitch);
  overflow:hidden;
  box-shadow:0 4px 24px rgba(0,0,0,0.5);
  z-index:0;
}
#pitch-bg::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(to bottom,transparent 0,transparent 9%,rgba(0,0,0,0.09) 9%,rgba(0,0,0,0.09) 18%);
}

/* ── PLAYER DOT ──
   .pdot is a flex column centred on its (left%, top%) coordinate.
   .ring = the coloured circle with position label.
   .tag  = small info area below the ring (always present, content grows with hints).

   IMPORTANT: transform:translate(-50%, -50%) centres the entire column on the coordinate.
   This means equal space above and below — which is fine because all y coords are
   set so that even with the tag below, nothing clips the pitch edges.
*/
.pdot{
  position:absolute;
  transform:translate(-50%,-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  z-index:3;
  cursor:pointer;
  gap:0;
}
.ring{
  width:var(--dot-size,58px);height:var(--dot-size,58px);
  border-radius:50%;
  background:#1b6132;
  border:2.5px solid rgba(255,255,255,0.85);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fh);font-weight:800;font-size:var(--dot-font,1.05rem);
  color:#fff;
  flex-shrink:0;
  transition:background 0.25s,border-color 0.25s,box-shadow 0.25s;
}
.pdot.active .ring{border-color:var(--lime);box-shadow:0 0 0 3px rgba(181,255,77,0.4);}
.pdot.solved .ring{background:var(--lime);border-color:var(--lime2);color:#0a2000;}

/* Tag sits directly below the ring */
.tag{
  display:flex;
  flex-direction:column;
  align-items:center;
  background:rgba(10,20,15,0.92);
  border-radius:4px;
  padding:3px 7px;
  margin-top:3px;
  min-width:36px;
  gap:0;
}
.tag-count{
  font-family:var(--fh);font-size:0.9rem;font-weight:700;
  color:rgba(255,255,255,0.9);line-height:1.2;white-space:nowrap;
}
.tag-name{
  font-family:var(--fh);font-size:0.95rem;font-weight:800;
  color:var(--lime);line-height:1.2;white-space:nowrap;display:none;
}
.tag-init{
  font-family:monospace;font-size:0.88rem;font-weight:700;
  color:var(--lime);line-height:1.2;white-space:nowrap;display:none;
}
.tag-clue{
  font-family:var(--fb);font-size:0.76rem;font-weight:600;
  color:rgba(255,255,255,0.95);line-height:1.2;white-space:nowrap;display:none;
}

/* ── BOTTOM CHROME — input + hints, flex-shrink:0 so keyboard doesn't move pitch ── */
#bottom-chrome{
  flex-shrink:0;
  padding-bottom:env(safe-area-inset-bottom,8px);
}
/* ── ACTION BOX ── */
#action-box{
  margin:4px 10px 3px;
  background:rgba(255,255,255,0.05);
  border:1.5px solid rgba(255,255,255,0.12);
  border-radius:12px;
  overflow:hidden;
}
/* Top row: input + go */
#input-row{
  display:flex;
  gap:0;
}
#guess-input{
  flex:1;
  background:transparent;
  border:none;
  color:var(--white);
  font-family:var(--fb);
  font-size:1rem;
  font-weight:500;
  padding:10px 12px;
  outline:none;
  -webkit-appearance:none;
}
#guess-input::placeholder{color:var(--muted)}
#guess-input.shake{animation:shake 0.35s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
#action-box:focus-within{border-color:rgba(181,255,77,0.4);background:rgba(181,255,77,0.04)}
#gobtn{
  background:var(--lime);color:#0a1a08;border:none;
  border-radius:0 10px 0 0;
  padding:10px 18px;
  font-family:var(--fh);font-weight:800;font-size:var(--dot-font,1.05rem);
  cursor:pointer;white-space:nowrap;
}
#gobtn:active{background:var(--lime2)}

/* reveal-one is now in the hint bar */
#reveal-one-btn{
  flex:1;
  background:rgba(255,180,0,0.1);
  border:1px solid rgba(255,180,0,0.3);
  border-radius:10px;
  color:rgba(255,210,80,0.95);
  font-family:var(--fb);
  font-size:0.78rem;
  font-weight:600;
  padding:8px 6px;
  cursor:pointer;
  text-align:center;
  line-height:1.3;
}
#reveal-one-btn:active{background:rgba(255,180,0,0.22)}
#reveal-one-btn:disabled{opacity:0.3;cursor:not-allowed}

/* ── HINT BUTTONS — two equal columns ── */
#hint-bar{padding:3px 10px 2px;display:flex;gap:7px}
.hbtn{
  flex:1;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:10px;
  color:var(--white);
  font-family:var(--fb);
  font-size:0.76rem;
  font-weight:600;
  padding:8px 6px;
  cursor:pointer;
  text-align:center;
  line-height:1.3;
}
.hbtn:active{background:rgba(255,255,255,0.14)}
.hbtn:disabled{opacity:0.3;cursor:not-allowed}
.hbtn .cost{display:block;font-size:0.64rem;color:var(--wrong);font-weight:700;margin-top:2px}

#wrong-count{font-size:0.7rem;color:var(--muted);font-weight:500;text-align:center;padding:2px 10px 4px;display:block}

/* ── TOAST ── */
#score-flash{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-family:var(--fh);font-size:4.5rem;font-weight:800;
  color:var(--lime);
  text-shadow:0 0 40px rgba(181,255,77,0.8),0 2px 20px rgba(0,0,0,0.9);
  pointer-events:none;z-index:200;opacity:0;
}
@keyframes scoreFlash{
  0%  {opacity:0;transform:translate(-50%,-50%) scale(0.5);}
  25% {opacity:1;transform:translate(-50%,-55%) scale(1.2);}
  65% {opacity:1;transform:translate(-50%,-62%) scale(1.0);}
  100%{opacity:0;transform:translate(-50%,-75%) scale(0.85);}
}
#toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--white);color:var(--navy);font-family:var(--fh);font-weight:700;font-size:0.95rem;padding:8px 18px;border-radius:30px;box-shadow:0 4px 20px rgba(0,0,0,0.35);transition:transform 0.3s cubic-bezier(.22,.68,0,1.2);z-index:100;white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--lime);color:#0a1a08}
#toast.bad{background:var(--wrong);color:#fff}
#toast.info{background:#1e3a5f;color:#a8d4ff}
#toast.warm{background:#ff9f1c;color:#1a0a00}

/* ── WIN OVERLAY ── */
#win{display:none;position:fixed;inset:0;background:rgba(13,27,42,0.96);z-index:50;align-items:center;justify-content:center;backdrop-filter:blur(8px);overflow-y:auto;padding:16px 0}
#win.show{display:flex}
.wcard{background:#0f1f33;border:1.5px solid rgba(181,255,77,0.25);border-radius:20px;padding:20px 18px 18px;text-align:center;max-width:380px;width:93%;box-shadow:0 0 60px rgba(181,255,77,0.12)}
.wgrade-block{margin-bottom:8px}
.wgrade-letter{font-family:var(--fh);font-size:5rem;font-weight:800;line-height:1;transition:color 0.3s}
.wgrade-label{font-family:var(--fh);font-size:1.05rem;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.wsub{color:var(--muted);font-size:0.7rem;margin-bottom:8px;line-height:1.4}
.wscore-block{margin-bottom:10px}
.wscore-num{font-family:var(--fh);font-size:2.2rem;font-weight:800;color:var(--white);line-height:1}
.wscore-lbl{font-size:0.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-top:1px}
.wstats-row{display:flex;justify-content:center;gap:8px;margin:10px 0 8px}
.wstat-pill{background:rgba(255,255,255,0.07);border-radius:20px;padding:5px 12px;font-family:var(--fh);font-size:0.88rem;font-weight:700;color:var(--white)}
.wstat-pill.bad{color:var(--wrong)}
.wpenalty-row{font-size:0.65rem;color:var(--wrong);margin-bottom:8px;min-height:0;line-height:1.4}

/* Wordle grid */
#wgrid-display{text-align:center;font-size:1.6rem;letter-spacing:2px;margin-bottom:8px;line-height:1.4}
#wgrid-legend{display:flex;justify-content:center;gap:14px;font-size:0.62rem;color:var(--muted);margin-bottom:10px;font-weight:500}
#wgrid-legend span{display:flex;align-items:center;gap:3px}

/* Share card */
.wshare{display:none} /* hidden — only used for clipboard copy */

.wbtns{display:flex;gap:8px;margin-top:0}
.wbtn{border:none;border-radius:10px;padding:10px 8px;font-family:var(--fh);font-weight:800;font-size:0.9rem;cursor:pointer;flex:1;text-align:center;line-height:1.2}
.wbtn-share{background:rgba(255,255,255,0.1);color:var(--white);border:1px solid rgba(255,255,255,0.2)}
.wbtn-share:active{background:rgba(255,255,255,0.18)}
.wbtn-lb{background:rgba(255,180,0,0.12);color:rgba(255,210,80,0.95);border:1px solid rgba(255,180,0,0.3)}
.wbtn-lb:active{background:rgba(255,180,0,0.22)}
#challenge-nudge{font-size:0.72rem;color:var(--muted);text-align:center;margin:10px 0 6px;font-style:italic}
.wbtn-challenge{background:var(--lime);color:#0a1a08;border:none;font-size:0.9rem}
.wbtn-challenge:active{background:var(--lime2)}
.wbtn-play{background:var(--lime);color:#0a1a08}
.wbtn-play:active{background:var(--lime2)}
.wbtn-submit{background:var(--lime);color:#0a1a08;border:none;border-radius:8px;padding:8px 14px;font-family:var(--fh);font-weight:800;font-size:0.88rem;cursor:pointer;white-space:nowrap;flex-shrink:0}
.wbtn-submit:active{background:var(--lime2)}
.wbtn-submit:disabled{opacity:0.4;cursor:not-allowed}

/* Name entry row */
#wname-row{display:flex;gap:8px;margin-bottom:6px}
#wname-input{flex:1;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.18);border-radius:8px;color:var(--white);font-family:var(--fb);font-size:0.9rem;padding:8px 10px;outline:none;-webkit-appearance:none}
#wname-input:focus{border-color:var(--lime)}
#wname-input::placeholder{color:var(--muted)}
#wsubmit-msg{font-size:0.7rem;color:var(--lime);font-weight:600;min-height:1rem;margin-bottom:8px;text-align:center}

/* Leaderboard overlay */
#lb-overlay{display:none;position:fixed;inset:0;background:rgba(13,27,42,0.96);z-index:90;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
#lb-overlay.show{display:flex}
#lb-card{background:#0f1f33;border:1.5px solid rgba(255,180,0,0.3);border-radius:20px;width:93%;max-width:380px;max-height:85dvh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 60px rgba(255,180,0,0.15)}
#lb-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0}
#lb-title{font-family:var(--fh);font-size:1.4rem;font-weight:800;color:rgba(255,210,80,0.95)}
#lb-close{background:rgba(255,255,255,0.08);border:none;color:var(--white);border-radius:50%;width:30px;height:30px;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
/* Puzzle filter tabs */
/* Mode tabs */
#lb-mode-tabs{display:flex;gap:0;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.08)}
.lb-mode-tab{flex:1;background:none;border:none;color:var(--muted);font-family:var(--fh);font-size:0.82rem;font-weight:700;padding:10px;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s}
.lb-mode-tab.active{color:rgba(255,210,80,0.95);border-bottom-color:rgba(255,210,80,0.95)}
/* Lineup filter tabs */
#lb-tabs{display:flex;gap:6px;padding:8px 12px 6px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#lb-tabs::-webkit-scrollbar{display:none}
.lb-tab{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.14);border-radius:20px;color:var(--muted);font-family:var(--fb);font-size:0.68rem;font-weight:600;padding:4px 12px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.lb-tab.active{background:rgba(255,180,0,0.15);border-color:rgba(255,180,0,0.4);color:rgba(255,210,80,0.95)}
/* Score list */
#lb-list{overflow-y:auto;flex:1;padding:0 12px 12px}
#lb-empty{padding:30px;text-align:center;color:var(--muted);font-size:0.85rem;display:none}
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:10px;margin-bottom:6px;background:rgba(255,255,255,0.04)}
.lb-row:first-child{background:rgba(255,180,0,0.1);border:1px solid rgba(255,180,0,0.25)}
.lb-rank{font-family:var(--fh);font-size:1.1rem;font-weight:800;color:var(--muted);width:24px;text-align:center;flex-shrink:0}
.lb-row:first-child .lb-rank{color:rgba(255,210,80,0.95)}
.lb-info{flex:1;min-width:0}
.lb-name{font-family:var(--fh);font-size:1rem;font-weight:700;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-meta{font-size:0.62rem;color:var(--muted);margin-top:1px}
.lb-score{font-family:var(--fh);font-size:1.15rem;font-weight:800;color:var(--lime);flex-shrink:0}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

/* ── PUZZLE PICKER ── */
#picker{position:fixed;inset:0;background:var(--navy);z-index:80;display:flex;flex-direction:column;overflow:hidden}
#picker.hidden{display:none}
#picker-header{padding:12px 14px 8px;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
#picker-tagline-row{padding:6px 14px 2px;font-size:0.72rem;color:var(--muted)}
#picker-logo{font-family:var(--fh);font-weight:800;font-size:1.6rem;line-height:1}
#picker-logo span{color:var(--lime)}
#picker-tagline{font-size:0.7rem;color:var(--muted);margin-top:2px}
#picker-lb-btn{background:rgba(255,180,0,0.12);color:rgba(255,210,80,0.95);border:1px solid rgba(255,180,0,0.3);border-radius:10px;padding:8px 12px;font-size:1rem;cursor:pointer}
#picker-lb-btn:active{background:rgba(255,180,0,0.22)}
#picker-share{background:rgba(255,255,255,0.08);color:var(--white);border:1px solid rgba(255,255,255,0.18);border-radius:10px;padding:8px 12px;font-family:var(--fh);font-weight:700;font-size:0.82rem;cursor:pointer}
#picker-share:active{background:rgba(255,255,255,0.16)}
#picker-scroll{flex:1;overflow-y:auto;padding:10px 12px 20px;min-height:200px}
.picker-group{margin-bottom:18px}
.picker-group-title{font-size:0.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding-left:2px}
.pcard{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:background 0.15s,border-color 0.15s}
.pcard:active{background:rgba(181,255,77,0.1);border-color:rgba(181,255,77,0.35)}
.pcard-badge{width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.pcard-info{flex:1;min-width:0}
.pcard-team{font-family:var(--fh);font-size:1.15rem;font-weight:800;color:var(--white);line-height:1.2}
.pcard-meta{font-size:0.74rem;color:rgba(255,255,255,0.55);margin-top:3px}
.pcard-match{font-size:0.7rem;color:rgba(255,255,255,0.45);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard-arrow{color:var(--muted);font-size:1rem;flex-shrink:0}
</style>
</head>
<body>
<div id="picker">
  <div id="picker-header">
    <div id="picker-logo">Lineup<span>Legends</span></div>
    <div style="display:flex;gap:8px;align-items:center">
      <button id="picker-lb-btn">🏅 Leaderboard</button>
      <button id="picker-share">📤 Share</button>
    </div>
  </div>
  <div id="picker-tagline-row">Choose a lineup to guess</div>
  <div id="picker-scroll"></div>
</div>

<div id="score-flash"></div>
<div id="app">
  <header>
    <div class="logo">Lineup<span>Legends</span></div>
    <button id="back-btn">⚽ Lineups</button>
  </header>
  <div id="scorebar">
    <div id="score-block">
      <div id="score-num">0</div>
      <div id="score-lbl">pts</div>
    </div>
    <div id="score-meta">
      <div id="ptitle">Loading…</div>
      <div id="hcomp"></div>
      <div id="hints-used"></div>
    </div>
  </div>
  <div id="prog-wrap">
    <div id="prog-track"><div id="prog-fill"></div></div>
  </div>
  <div id="challenge-banner">
    <div class="cb-name" id="cb-name"></div>
    <div class="cb-score" id="cb-score"></div>
  </div>
  <div id="pitch-wrap">
    <div id="pitch"><div id="pitch-bg"></div></div>
  </div>
  <div id="bottom-chrome">
    <div id="action-box">
      <div id="input-row">
        <input id="guess-input" type="text" placeholder="Type a surname…"
          autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"
          autocomplete="new-password" inputmode="text"/>
        <button id="gobtn">GO</button>
      </div>
    </div>
    <div id="hint-bar">
      <button class="hbtn" id="btn-nat" disabled>🌍 Reveal Nationality<span class="cost">−40 pts</span></button>
      <button class="hbtn" id="btn-init" disabled>🔤 Show 1st Letter<span class="cost">−30 pts</span></button>
      <button id="reveal-one-btn" disabled>👁 Reveal Player<span class="cost">−150 pts</span></button>
    </div>
  </div>
  <span id="wrong-count"></span>
</div>

<div id="win">
  <div class="wcard">
    <!-- Results — shown immediately -->
    <div id="wresults-screen">
      <div class="wgrade-block">
        <div class="wgrade-letter" id="wgrade-letter">-</div>
        <div class="wgrade-label" id="wgrade-label">-</div>
      </div>
      <div class="wsub" id="wsub"></div>
      <div class="wscore-block">
        <div class="wscore-num" id="wfinal-score">-</div>
        <div class="wscore-lbl">pts / 1,100</div>
      </div>
      <div id="wgrid-display"></div>
      <div class="wstats-row"><div class="wstat-pill" id="wt">⏱ -</div></div>
      <div class="wpenalty-row" id="wpenalty-row"></div>
      <div class="wshare" id="wshare-text"></div>
      <div id="challenge-nudge">Think your mates can beat that? 👀</div>
      <button class="wbtn wbtn-challenge" id="challenge-btn" style="width:100%;margin-bottom:10px">⚔️ Challenge Friends</button>
      <div class="wbtns">
        <button class="wbtn wbtn-lb" id="view-lb-btn">🏅 Board</button>
        <button class="wbtn wbtn-play" id="again-btn">▶ Play</button>
      </div>
    </div>
    <!-- Name entry — appears when Share tapped -->
    <div id="wname-screen" style="display:none">
      <div style="font-family:var(--fh);font-size:1.1rem;font-weight:800;color:var(--white);margin-bottom:6px">Save &amp; challenge your mates 👊</div>
      <div style="font-size:0.72rem;color:var(--muted);margin-bottom:16px">Your name goes on the group leaderboard</div>
      <div id="wname-row">
        <input id="wname-input" type="text" placeholder="Your name…" maxlength="20"
          autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false"/>
        <button class="wbtn wbtn-submit" id="submit-score-btn">Go →</button>
      </div>
      <div id="wsubmit-msg"></div>
      <button id="skip-name-btn" style="background:none;border:none;color:var(--muted);font-size:0.7rem;cursor:pointer;margin-top:10px;text-decoration:underline">Share anonymously</button>
      <button id="back-to-results-btn" style="background:none;border:none;color:var(--muted);font-size:0.7rem;cursor:pointer;margin-top:6px;display:block;width:100%">← Back to results</button>
    </div>
  </div>
</div>

<!-- Leaderboard overlay -->
<div id="lb-overlay">
  <div id="lb-card">
    <div id="lb-header">
      <div id="lb-title">🏅 Leaderboard</div>
      <button id="lb-close">✕</button>
    </div>
    <!-- Mode tabs: Overall vs Per Lineup -->
    <div id="lb-mode-tabs">
      <button class="lb-mode-tab" id="tab-group" style="display:none">👥 Group</button>
      <button class="lb-mode-tab active" id="tab-lineup">⚽ By Lineup</button>
      <button class="lb-mode-tab" id="tab-overall">🌍 Overall</button>
    </div>
    <!-- Lineup filter tabs (hidden in overall mode) -->
    <div id="lb-tabs"></div>
    <div id="lb-list"></div>
    <div id="lb-empty">No scores yet — be the first!</div>
  </div>
</div>
<div id="toast"></div>

// ── HELPERS ──
function norm(s){
  return(s||'').toLowerCase().normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9 ']/g,'').trim();
}

// Levenshtein edit distance
function editDist(a,b){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=0;j<=n;j++)dp[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

// Fuzzy tolerance: 1 error per 5 chars, min 0, max 3
function fuzzyTol(s){ return Math.min(3, Math.floor(s.length/5)); }

// Whether guess fuzzy-matches a target string
function fuzzyMatch(guess, target){
  if(guess===target) return true;
  return editDist(guess, target) <= fuzzyTol(target);
}

// getSurname: handles compound surnames like "De Bruyne", "Arne Riise", "Obi Mikel"
// Prefixes that are part of the surname, not a first name
const PREFIXES=new Set(['de','van','von','den','der','el','al','arne','obi','dos','di','da','le','la']);
function getSurname(name){
  const parts=name.trim().split(' ');
  if(parts.length===1) return parts[0];
  // Find where the surname starts: first part (after the first word) that is a prefix
  // or the last word if no prefix found
  for(let i=1;i<parts.length;i++){
    if(PREFIXES.has(parts[i].toLowerCase())) return parts.slice(i).join(' ');
  }
  return parts[parts.length-1];
}

function isMatch(guess, name){
  const g=norm(guess), n=norm(name);
  // Exact full name
  if(fuzzyMatch(g,n)) return true;
  const parts=n.split(' ');
  // Try surname (last word or compound from prefix)
  const sn=norm(getSurname(name));
  if(sn.length>=3 && fuzzyMatch(g,sn)) return true;
  // Try last word alone (catches "Bruyne" for "De Bruyne")
  const lastWord=parts[parts.length-1];
  if(lastWord.length>=3 && fuzzyMatch(g,lastWord)) return true;
  return false;
}

  const natTeams=['England','Spain','France','Germany','Italy','Argentina','Brazil','Portugal','Netherlands','Belgium'];
  return natTeams.includes(puzzle.team)?p.club:p.nat;
}

function startTimer(){
  clearInterval(scoreTimer);
  // No score drain — just track elapsed time for display & time bonus
  scoreTimer=setInterval(()=>{},9999);
}
function showScoreFlash(pts){
  if(!pts||pts<=0)return;
  const el=document.getElementById('score-flash');
  if(!el)return;
  el.textContent='+'+pts;
  el.style.animation='none';
  void el.offsetWidth; // force reflow
  el.style.animation='scoreFlash 0.85s ease forwards';
}

function renderScore(flash){
  const el=document.getElementById('score-num');
  el.textContent=S.score.toLocaleString();
  if(flash){
    el.classList.remove('hit');
    el.style.animation='none';
    requestAnimationFrame(()=>{
      el.style.animation='scoreUp 0.35s ease';
      el.classList.add('hit');
      setTimeout(()=>{el.classList.remove('hit');el.style.animation='';},400);
    });
  }
}

function init(puzzle){
  // If no puzzle passed, pick random
  if(!puzzle){
    if(usedIds.length>=PUZZLES.length)usedIds=[];
    const rem=PUZZLES.filter(p=>!usedIds.includes(p.id));
    puzzle=rem[Math.floor(Math.random()*rem.length)];
  }
  usedIds.push(puzzle.id);
  const layout=LAYOUTS[puzzle.formation]||LAYOUTS['442'];
  S={puzzle,layout,solved:new Set(),guesses:0,wrong:0,
     score:0,             // built up as players are solved
     playerPotential:{},  // i -> current potential (starts at 100, reduced by hints)
     natDone:new Set(),
     initDone:new Set(),
     lettersRevealed:new Map(), // i -> count of letters revealed
     revealedPlayers:new Set(),
     done:false,start:Date.now(),activeIdx:null};
  // Initialise potential for each player
  puzzle.players.forEach((_,i)=>{ S.playerPotential[i]=BASE_PER_PLAYER; });
  winShown=false;
  document.getElementById('win').classList.remove('show');
  document.getElementById('guess-input').value='';
  buildPitch();
  renderUI();
  startTimer();
}

function buildPitch(){
  const pitch=document.getElementById('pitch');
  [...pitch.querySelectorAll('.pdot')].forEach(d=>d.remove());
  document.getElementById('pitch-bg').innerHTML=pitchSVG();

  const fmt=S.puzzle.formation.split('').join('-');
  // Title: Team · Year · Formation
  document.getElementById('ptitle').textContent=`${S.puzzle.team} · ${S.puzzle.year} · ${fmt}`;
  // Comp + match context below
  document.getElementById('hcomp').textContent=`${S.puzzle.competition} · ${S.puzzle.match}`;

  // Set nationality button label: national teams → hint is club side, club teams → hint is nationality
  const isNatTeam=['England','Spain','France','Germany','Italy','Argentina','Brazil','Portugal','Netherlands','Belgium'].includes(S.puzzle.team);
  const natBtn=document.getElementById('btn-nat');
  natBtn.innerHTML=isNatTeam
    ? '🏟️ Reveal Club<span class="cost">−40 pts</span>'
    : '🌍 Reveal Nationality<span class="cost">−40 pts</span>';

  S.puzzle.players.forEach((p,i)=>{
    const pos=S.layout[i]||{x:50,y:50};
    const sn=getSurname(p.name);
    const dot=document.createElement('div');
    dot.className='pdot';
    dot.id=`dot-${i}`;
    dot.style.left=pos.x+'%';
    dot.style.top=pos.y+'%';
    if(['4411','4231'].includes(S.puzzle.formation)){
      dot.style.setProperty('--dot-size','50px');
      dot.style.setProperty('--dot-font','0.88rem');
    }
    dot.innerHTML=
      `<div class="ring" id="ring-${i}">${p.pos}</div>`+
      `<div class="tag">`+
        `<span class="tag-count" id="tc-${i}">(${sn.length})</span>`+
        `<span class="tag-name" id="tn-${i}"></span>`+
        `<span class="tag-init" id="ti-${i}"></span>`+
        `<span class="tag-clue" id="tclue-${i}"></span>`+
      `</div>`;
    dot.addEventListener('click',()=>setActive(i));
    pitch.appendChild(dot);
  });
}

function setActive(i){
  if(S.solved.has(i)) return;
  S.activeIdx=i;
  S.puzzle.players.forEach((_,j)=>{
    const dot=document.getElementById(`dot-${j}`);
    if(dot) dot.classList.toggle('active', j===i);
  });
  // Enable hint buttons now a player is selected
  document.getElementById('btn-nat').disabled=false;
  document.getElementById('btn-init').disabled=false;
  renderStrip();
}

function renderStrip(){
  const i=S.activeIdx;
  const revOne=document.getElementById('reveal-one-btn');
  const natBtn=document.getElementById('btn-nat');
  const initBtn=document.getElementById('btn-init');

  // No player selected or already solved — disable reveal
  if(i===null||i===undefined||S.solved.has(i)){
    if(revOne) revOne.disabled=true;
    return;
  }

  // Player selected — enable reveal, update letter cost
  if(revOne) revOne.disabled=false;
  const sn=getSurname(S.puzzle.players[i].name);
  const already=S.lettersRevealed.get(i)||0;
  const nextIdx=already;
  const nextCost=nextIdx<HINT_COST_LETTER.length ? HINT_COST_LETTER[nextIdx] : HINT_COST_LETTER[HINT_COST_LETTER.length-1];
  const remaining=sn.length-already;
  const letterNum=already+1;
  const letterLabel=letterNum===1?'1st':letterNum===2?'2nd':letterNum===3?'3rd':letterNum+'th';
  if(initBtn) initBtn.innerHTML=remaining>0
    ? (nextCost>0 ? `🔤 Reveal ${letterLabel} Letter<span class="cost">-${nextCost}pts</span>` : `🔤 Reveal ${letterLabel} Letter<span class="cost">free</span>`)
    : `🔤 All Letters Shown`;
}

function renderUI(){
  const {puzzle,solved,wrong,natDone,initDone,lettersRevealed,hintsTotal}=S;
  const total=puzzle.players.length,found=solved.size;
  document.getElementById('prog-fill').style.width=`${(found/total)*100}%`;
  // progress bar only — no text counter (visible on pitch)
  // Hints tracker
  const totalLetters=Array.from(lettersRevealed.values()).reduce((a,b)=>a+b,0);
  const hintParts=[];
  if(natDone.size>0) hintParts.push(`🌍×${natDone.size}`);
  if(totalLetters>0) hintParts.push(`🔤×${totalLetters}`);
  if(wrong>0) hintParts.push(`❌×${wrong}`);
  document.getElementById('hints-used').textContent=hintParts.join('  ');
  document.getElementById('wrong-count').textContent='';
  renderScore();
  renderStrip();
}

// Award points and solve — called on correct guess
function awardAndSolve(i,name){
  const pts=S.playerPotential[i]||0; // can be negative for reveals
  S.score+=pts;
  S.score=Math.max(-500,S.score); // floor at -500
  renderScore(pts!==0);
  if(pts>0) showScoreFlash(pts);
  solveDot(i,name);
}

// Solve a dot: show surname in tag, hide count/hints
function solveDot(i,name){
  const dot=document.getElementById(`dot-${i}`);
  const tc=document.getElementById(`tc-${i}`);
  const tn=document.getElementById(`tn-${i}`);
  const ti=document.getElementById(`ti-${i}`);
  const tclue=document.getElementById(`tclue-${i}`);
  if(dot){dot.classList.add('solved');dot.classList.remove('active');}
  if(tc)tc.style.display='none';
  if(ti)ti.style.display='none';
  if(tclue)tclue.style.display='none';
  if(tn){tn.textContent=getSurname(name);tn.style.display='block';}
  // If this was the active player, clear selection and find next unsolved
  if(S.activeIdx===i){
    const next=S.puzzle.players.findIndex((_,j)=>j!==i&&!S.solved.has(j));
    S.activeIdx=next>=0?next:null;
    if(S.activeIdx!==null){
      const nd=document.getElementById(`dot-${S.activeIdx}`);
      if(nd)nd.classList.add('active');
      document.getElementById('btn-nat').disabled=false;
      document.getElementById('btn-init').disabled=false;
    } else {
      // All solved
      document.getElementById('btn-nat').disabled=true;
      document.getElementById('btn-init').disabled=true;
    }
  }
}

// ── PARTIAL MATCH ──
// Returns {player index, matchedChars} if guess is a strong partial/near-match
// but not a full match. Used for "so close" feedback.
function checkPartial(val){
  const g = norm(val);
  if(g.length < 3) return null; // too short to bother

  let best = null;

  S.puzzle.players.forEach((p, i) => {
    if(S.solved.has(i)) return;

    const sn = norm(getSurname(p.name));
    const fullNorm = norm(p.name);

    // 1. Prefix match: guess is a prefix of the surname (min 3 chars, at least 50% of surname)
    if(sn.startsWith(g) && g.length >= Math.max(3, Math.floor(sn.length * 0.4))){
      best = {i, sn, matched: g.length, type:'prefix'};
    }
    // 2. Near-miss: within fuzzy tolerance + 1 (one more error than we accept as correct)
    // Only fires if guess is long enough to be meaningful
    if(!best && g.length >= 4){
      const dist = editDist(g, sn);
      const nearTol = fuzzyTol(sn) + 1;
      if(dist <= nearTol && dist > 0){
        best = {i, sn, matched: sn.length - dist, type:'near'};
      }
      // Also check full name
      if(!best){
        const distFull = editDist(g, fullNorm);
        if(distFull <= nearTol + 1 && distFull > 0){
          best = {i, sn, matched: sn.length - 1, type:'near'};
        }
      }
    }
  });

  return best;
}

// Show partial progress on a dot's tag — lights up correctly-typed letters
function showPartialOnDot(i, sn, matchedCount){
  const ti = document.getElementById(`ti-${i}`);
  if(!ti) return;
  // Build: matched letters shown, rest as dots e.g. "Casil···"
  const shown = sn.slice(0, matchedCount);
  const remaining = '·'.repeat(Math.max(0, sn.length - matchedCount));
  ti.textContent = shown + remaining;
  ti.style.display = 'block';
}

function guess(val){
  if(S.done||!val.trim())return;
  const g = val.trim();

  // Check for full match first
  let hit=false, hitName='';
  S.puzzle.players.forEach((p,i)=>{
    if(!S.solved.has(i)&&isMatch(g,p.name)){
      S.solved.add(i);awardAndSolve(i,p.name);hit=true;hitName=p.name;
    }
  });

  if(hit){
    S.guesses++;
    toast('✓ '+hitName,'ok');haptic('correct');soundCorrect();
    document.getElementById('guess-input').value='';
    if(S.solved.size===S.puzzle.players.length){
      S.done=true; // prevent any further guesses while win screen loads
      setTimeout(showWin,700);
    }
    renderUI();
    return;
  }

  // Check for partial / near match — no penalty, no guess count increment
  const partial = checkPartial(g);
  if(partial){
    const {i, sn, matched, type} = partial;
    showPartialOnDot(i, sn, matched);
    // Highlight the relevant dot
    S.puzzle.players.forEach((_,j)=>{
      const d=document.getElementById(`dot-${j}`);
      if(d) d.classList.toggle('active', j===i);
    });
    S.activeIdx = i;
    if(type === 'prefix'){
      toast(`So close! Keep going…`, 'warm');
    } else {
      toast(`Nearly! Check the spelling`, 'warm');
    }
    // Don't clear input — let them keep typing / correcting
    // Don't penalise score or increment wrong count
    renderUI();
    return;
  }

  // Full wrong guess
  S.guesses++;
  S.wrong++;
  // Soft anti-spam: after 30 wrong guesses show a nudge
  if(S.wrong===30) toast('💡 Try using hints if you\'re stuck!','info');
  toast('Not in this lineup','bad');haptic('wrong');soundWrong();
  const inp=document.getElementById('guess-input');
  inp.classList.add('shake');
  setTimeout(()=>inp.classList.remove('shake'),400);
  document.getElementById('guess-input').value='';
  renderUI();
}

function doNat(){
  if(S.done)return;
  const i=S.activeIdx;
  if(i===null||i===undefined){toast('Tap a player first!','bad');return;}
  if(S.solved.has(i)){toast('Already solved!','info');return;}
  if(S.natDone.has(i)){toast('Already revealed for this player','info');return;}
  S.natDone.add(i);
  S.playerPotential[i]=Math.max(0,(S.playerPotential[i]||BASE_PER_PLAYER)-HINT_COST_NAT);
  renderScore(false);
  const p=S.puzzle.players[i];
  const lbl=hintLabel(p,S.puzzle);
  const fl=flag(p.nat);
  const tclue=document.getElementById(`tclue-${i}`);
  if(tclue){tclue.textContent=`${fl} ${lbl}`;tclue.style.display='block';}
  toast(`${fl} ${lbl}`,'info');haptic('hint');soundHint();
  renderUI();
}

function doInit(){
  if(S.done)return;
  const i=S.activeIdx;
  if(i===null||i===undefined){toast('Tap a player first!','bad');return;}
  if(S.solved.has(i)){toast('Already solved!','info');return;}
  const sn=getSurname(S.puzzle.players[i].name);
  const already=S.lettersRevealed.get(i)||0;
  if(already>=sn.length){toast('All letters revealed!','info');return;}
  // Cost scales: 150 for 1st, +50 per additional letter
  // Cost depends on which letter this is: 25, 25, then 10 for each after
  const letterIdx=already; // 0-based index of letter being revealed
  const cost=letterIdx<HINT_COST_LETTER.length ? HINT_COST_LETTER[letterIdx] : (HINT_COST_LETTER[HINT_COST_LETTER.length-1]);
  S.playerPotential[i]=Math.max(0,(S.playerPotential[i]||BASE_PER_PLAYER)-cost);
  renderScore(false);
  const next=already+1;
  S.lettersRevealed.set(i,next);
  S.initDone.add(i);
  const revealed=sn.slice(0,next).toUpperCase();
  const dots='·'.repeat(sn.length-next);
  const hint=revealed+dots;
  const ti=document.getElementById(`ti-${i}`);
  if(ti){ti.textContent=hint;ti.style.display='block';}
  // Update button to show escalating cost
  const nextIdx=next;
  const nextCost=nextIdx<HINT_COST_LETTER.length ? HINT_COST_LETTER[nextIdx] : HINT_COST_LETTER[HINT_COST_LETTER.length-1];
  const remaining=sn.length-next;
  const nextLetterNum=next+1;
  const nextLabel=nextLetterNum===1?'1st':nextLetterNum===2?'2nd':nextLetterNum===3?'3rd':nextLetterNum+'th';
  document.getElementById('btn-init').innerHTML=remaining>0
    ? (nextCost>0 ? `🔤 Show ${nextLabel} Letter<span class="cost">−${nextCost} pts</span>` : `🔤 Show ${nextLabel} Letter<span class="cost">free</span>`)
    : `🔤 All Letters Shown`;
  toast(`Letter ${next}/${sn.length}: ${hint}`,'info');

  // Auto-solve if all letters now revealed
  if(next>=sn.length){
    S.solved.add(i);
    awardAndSolve(i,S.puzzle.players[i].name);
    toast(`✓ ${getSurname(S.puzzle.players[i].name)}`,'ok');
    if(S.solved.size===S.puzzle.players.length){
      S.done=true;
      setTimeout(showWin,1000);
    }
  }
  renderUI();
}

function revealOne(){
  const i=S.activeIdx;
  if(i===null||i===undefined||S.solved.has(i)||S.done)return;
  S.revealedPlayers.add(i);
  S.playerPotential[i]=-REVEAL_PENALTY; // reveal = heavy penalty
  S.solved.add(i);
  awardAndSolve(i,S.puzzle.players[i].name);
  toast('👁 '+getSurname(S.puzzle.players[i].name),'info');
  if(S.solved.size===S.puzzle.players.length)setTimeout(showWin,3000);
  renderUI();
}

function revealAll(){
  if(S.done)return;
  S.puzzle.players.forEach((p,i)=>{
    if(!S.solved.has(i)){S.playerPotential[i]=-REVEAL_PENALTY;S.solved.add(i);awardAndSolve(i,p.name);}
  });
  renderUI();
  setTimeout(showWin,3000);
}

let winShown=false;
function showWin(){
  if(winShown)return;
  winShown=true;
  S.done=true;clearInterval(scoreTimer);
  try{
  const elapsed=Math.round((Date.now()-S.start)/1000);
  const mins=Math.floor(elapsed/60), secs=elapsed%60;
  const timeStr=mins>0?`${mins}m ${secs}s`:`${secs}s`;
  const totalGuesses=S.guesses;
  const correct=S.puzzle.players.length;
  const acc=Math.round((correct/Math.max(totalGuesses,1))*100);

  // Score breakdown — work out how many points came from clean vs hinted guesses
  const letterTotal=Array.from(S.lettersRevealed.values()).reduce((a,b)=>a+b,0);
  const revealCount=S.revealedPlayers?S.revealedPlayers.size:0;
  const hintedCount=S.natDone.size+letterTotal; // total individual hints used

  // Calculate nat penalty and letter penalty for display only
  let natPenalty=0, letterPenalty=0, revealPenalty=0;
  S.puzzle.players.forEach((_,i)=>{
    if(S.natDone.has(i)) natPenalty+=HINT_COST_NAT;
    const lc=S.lettersRevealed.get(i)||0;
    for(let k=0;k<lc;k++) letterPenalty+=(k<HINT_COST_LETTER.length?HINT_COST_LETTER[k]:HINT_COST_LETTER[HINT_COST_LETTER.length-1]);
    if(S.revealedPlayers&&S.revealedPlayers.has(i)) revealPenalty+=REVEAL_PENALTY;
  });
  const timeBonus=0;
  const finalScore=S.score;

  // Grade — hero element
  const grade=getGrade(finalScore);
  const glEl=document.getElementById('wgrade-letter');
  const glLb=document.getElementById('wgrade-label');
  if(glEl){glEl.textContent=grade.letter;glEl.style.color=grade.color;}
  if(glLb){glLb.textContent=grade.label;}

  // Populate card
  S.score=finalScore;
  document.getElementById('wsub').textContent=`${S.puzzle.team} · ${S.puzzle.year} · ${S.puzzle.competition}`;
  // Show challenge result if applicable
  const chalResult=checkChallengeWin(finalScore,elapsed,challengeParam);
  if(chalResult){
    const sub=document.getElementById('wsub');
    const div=document.createElement('div');
    div.style.cssText='font-size:0.95rem;font-weight:800;color:var(--lime);margin-bottom:6px;font-family:var(--fh)';
    div.textContent=chalResult;
    sub.parentNode.insertBefore(div,sub);
  }
  document.getElementById('wfinal-score').textContent=finalScore.toLocaleString();
  document.getElementById('wt').textContent=`⏱ ${timeStr}`;
  // Wrong guesses not shown — all players must be completed so it's not meaningful

  // Hint penalty summary
  const totalPenalty=natPenalty+letterPenalty+revealPenalty;
  const penRow=document.getElementById('wpenalty-row');
  if(penRow){
    const parts=[];
    if(S.natDone.size) parts.push(`🌍×${S.natDone.size} (−${natPenalty}pts)`);
    if(letterTotal) parts.push(`🔤×${letterTotal} (−${letterPenalty}pts)`);
    if(revealCount) parts.push(`👁×${revealCount} (−${revealPenalty}pts penalty)`);
    penRow.textContent=parts.length?'Hints: '+parts.join('  '):'';
  }

  // Shareable text (Wordle-style)
  const fmt=S.puzzle.formation.split('').join('-');
  const hintBar=()=>{
    const parts=[];
    if(S.natDone.size) parts.push(`🌍×${S.natDone.size}`);
    if(letterTotal) parts.push(`🔤×${letterTotal}`);
    if(revealCount) parts.push(`👁×${revealCount}`);
    if(S.wrong) parts.push(`❌×${S.wrong}`);
    return parts.length?parts.join(' '):'No hints used! 🎯';
  };
  // Build Wordle-style grid
  const grid = S.puzzle.players.map((_,i) => {
    if(S.revealedPlayers && S.revealedPlayers.has(i)) return '🟥';
    const hasNat = S.natDone.has(i);
    const letters = S.lettersRevealed.get(i)||0;
    if(!hasNat && letters===0) return '🟩'; // clean guess
    return '🟨'; // used some hints
  }).join('');

  // Flat single row of 11 squares for share — clean like Wordle
  const flatGrid = S.puzzle.players.map((_,i) => {
    if(S.revealedPlayers && S.revealedPlayers.has(i)) return '🟥';
    return (S.natDone.has(i)||(S.lettersRevealed.get(i)||0)>0) ? '🟨' : '🟩';
  }).join('');

  const totalHints = S.natDone.size + Array.from(S.lettersRevealed.values()).reduce((a,b)=>a+b,0) + (S.revealedPlayers?S.revealedPlayers.size:0);

  const shareText =
`⚽ Lineup Legends #${S.puzzle.id}
${S.puzzle.team} ${S.puzzle.year} (${fmt})

${flatGrid}

Grade ${grade.letter} · ${finalScore.toLocaleString()}pts · ${timeStr}

lineuplegends.netlify.app`;

  document.getElementById('wshare-text').textContent=shareText;

  // Render visual grid
  const gridEl=document.getElementById('wgrid-display');
  if(gridEl){
    // Split into rows of 4 max for readability (GK, then 4+4+etc)
    const squares=S.puzzle.players.map((_,i)=>{
      if(S.revealedPlayers&&S.revealedPlayers.has(i)) return '🟥';
      const hasNat=S.natDone.has(i);
      const letters=S.lettersRevealed.get(i)||0;
      return (!hasNat&&letters===0)?'🟩':'🟨';
    });
    // Wrap into lines matching formation rows (GK / DEF / MID / FWD)
    // Simple: one line of 11 squares, wrap after each formation band
    const layout=S.layout;
    // Group by approximate y band, then sort each row by x (left→right = pitch layout)
    const rows=[];
    let currentRow=[], lastY=null;
    squares.forEach((sq,i)=>{
      const y=layout[i]?layout[i].y:50;
      const x=layout[i]?layout[i].x:50;
      if(lastY!==null && Math.abs(y-lastY)>8){
        // Sort current row by x before pushing
        currentRow.sort((a,b)=>a.x-b.x);
        rows.push(currentRow.map(e=>e.sq));
        currentRow=[];
      }
      currentRow.push({sq,x}); lastY=y;
    });
    if(currentRow.length){
      currentRow.sort((a,b)=>a.x-b.x);
      rows.push(currentRow.map(e=>e.sq));
    }
    // Reverse so attack is top (as displayed on pitch)
    gridEl.innerHTML=rows.reverse().map(r=>r.join('')).join('<br>');
  }

  // Populate name screen preview
  if(glPre){glPre.textContent=grade.letter;glPre.style.color=grade.color;}
  // Show results immediately
  const rs=document.getElementById('wresults-screen');const ns=document.getElementById('wname-screen');
  if(rs)rs.style.display='block';if(ns)ns.style.display='none';
  const ni=document.getElementById('wname-input');if(ni){ni.value='';ni.disabled=false;}
  const sm=document.getElementById('wsubmit-msg');if(sm)sm.textContent='';
  const sb=document.getElementById('submit-score-btn');if(sb){sb.disabled=false;sb.textContent='Go →';}
  haptic('win');soundWin();
  document.getElementById('win').classList.add('show');
  }catch(e){
    console.error('showWin error:',e);
    // Still show the win overlay even if something in the breakdown fails
    document.getElementById('win').classList.add('show');
  }
}

    groups.get(p.competition).push(p);
  });

  // Render in competition order
  const ordered = [...COMP_ORDER.filter(c => groups.has(c)),
                   ...[...groups.keys()].filter(c => !COMP_ORDER.includes(c))];

  ordered.forEach(comp => {

function renderGroupLb(data,groupId){
  const grouped=data.filter(e=>e.group_id===groupId);
  document.getElementById('lb-tabs').style.display='none';
  const list=document.getElementById('lb-list');
  list.innerHTML='';
  if(!grouped.length){
    list.innerHTML='<div style="padding:24px;text-align:center;color:var(--muted);font-size:0.85rem;line-height:1.6">Nobody else in the group has played yet!<br><br>Share the challenge link to get them playing 👊</div>';
    return;
  }
  const best=new Map();
  grouped.forEach(e=>{
    const k=e.name;
    if(!best.has(k)||e.score>best.get(k).score||(e.score===best.get(k).score&&(e.time_seconds||9999)<(best.get(k).time_seconds||9999)))
      best.set(k,e);
  });
  const sorted=[...best.values()].sort((a,b)=>b.score-a.score||((a.time_seconds||9999)-(b.time_seconds||9999)));

  header.textContent=`Group · ${grouped[0]?.puzzle_label||''} · ${sorted.length} player${sorted.length!==1?'s':''}`;

    const row=document.createElement('div');
    row.className='lb-row';
    const mins=Math.floor((e.time_seconds||0)/60),secs=(e.time_seconds||0)%60;

// Overall leaderboard — ranked by total cumulative score across all games
function renderOverall(){
  document.getElementById('lb-tabs').style.display='none';
  const totals=new Map();
  lbData.forEach(e=>{
    if(!totals.has(e.name)) totals.set(e.name,{name:e.name,total:0,games:0,bestGrade:'F',grades:[]});
    const t=totals.get(e.name);
    // Only count best score per puzzle per person
    const key=`${e.name}:${e.puzzle_id}`;
    if(!t._best) t._best=new Map();
    if(!t._best.has(e.puzzle_id)||e.score>t._best.get(e.puzzle_id)){
      if(t._best.has(e.puzzle_id)) t.total-=t._best.get(e.puzzle_id);
      t._best.set(e.puzzle_id,e.score);
      t.total+=e.score;
      t.games=t._best.size;
    }
    t.grades.push(e.grade);
  });
  const sorted=[...totals.values()].sort((a,b)=>b.total-a.total).slice(0,25);
  renderRows(sorted, e=>`${e.games} lineup${e.games!==1?'s':''} played`, e=>e.total.toLocaleString()+' total');
}

// Per lineup leaderboard — best score per person per puzzle
function renderByLineup(puzzleId){
  const filtered=puzzleId?lbData.filter(e=>e.puzzle_id===puzzleId):lbData;
  const best=new Map();
  filtered.forEach(e=>{
    const k=`${e.name}:${e.puzzle_id}`;
    if(!best.has(k)||e.score>best.get(k).score) best.set(k,e);
  });
  const sorted=[...best.values()].sort((a,b)=>b.score-a.score||((a.time_seconds||9999)-(b.time_seconds||9999))).slice(0,25);
  renderRows(sorted,
    e=>{const m=Math.floor(e.time_seconds/60),s=e.time_seconds%60;return (m>0?`${m}m ${s}s`:`${s}s`)+` · Grade ${e.grade}`;},
    e=>e.score.toLocaleString()
  );
}

function makeGroupId(){return Math.random().toString(36).slice(2,8).toUpperCase();}

function buildChallengeUrl(){
  const name=S.playerName||document.getElementById('wname-input').value.trim()||'Someone';
  const grade=getGrade(S.score);
  const elapsed=Math.round((Date.now()-S.start)/1000);
  if(!S.groupId)S.groupId=makeGroupId();
  const params=new URLSearchParams({c:S.puzzle.id,s:S.score,g:grade.letter,n:encodeURIComponent(name),t:elapsed,grp:S.groupId});
  return `${window.location.origin}${window.location.pathname}?${params.toString()}`;
}

function generateChallenge(){
  const name=S.playerName||'Someone';
  const grade=getGrade(S.score);
  const elapsed=S.start?Math.round((Date.now()-S.start)/1000):0;
  const mins=Math.floor(elapsed/60),secs=elapsed%60;
  const tStr=mins>0?`${mins}m ${secs}s`:`${elapsed}s`;
  const stars='⭐'.repeat(S.puzzle.difficulty||3);

  // Build challenge URL with puzzle id, score, grade, time, name
  if(!S.groupId) S.groupId=Math.random().toString(36).slice(2,8).toUpperCase();
  const params=new URLSearchParams({
    c:S.puzzle.id,
    s:S.score,
    g:grade.letter,
    t:elapsed,
    n:encodeURIComponent(name),
    grp:S.groupId
  });
  const url='https://lineuplegends.netlify.app/?'+params.toString();

  // Build flat grid
  const flatGrid=S.puzzle.players.map((_,i)=>{
    if(S.revealedPlayers&&S.revealedPlayers.has(i))return'🟥';
    return(S.natDone.has(i)||(S.lettersRevealed.get(i)||0)>0)?'🟨':'🟩';
  }).join('');

  const trashLines=[
    `${name} got Grade ${grade.letter} on ${S.puzzle.team} ${S.puzzle.year} in ${tStr} (${S.score.toLocaleString()}pts). Think you can do better? 😂`,
    `${name} smashed ${S.puzzle.team} ${S.puzzle.year} — Grade ${grade.letter}, ${S.score.toLocaleString()}pts in ${tStr}. Don't embarrass yourself 👀`,
    `Grade ${grade.letter}. ${S.score.toLocaleString()}pts. ${tStr}. ${name} is waiting... 😤`,
    `${name} completed ${S.puzzle.team} ${S.puzzle.year} ${stars} in ${tStr}. Your move 👊`,
  ];
  const trash=trashLines[Math.floor(Math.random()*trashLines.length)];

  const shareText=`⚽ Lineup Legends #${S.puzzle.id}
${S.puzzle.team} ${S.puzzle.year} ${stars}

${flatGrid}

${trash}

👥 Beat me:
${url}`;

  if(navigator.share){
    navigator.share({title:'Lineup Legends',text:shareText})
      .catch(()=>{
        if(navigator.clipboard) navigator.clipboard.writeText(shareText).then(()=>toast('Copied!','ok'));
      });
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(shareText).then(()=>toast('Copied!','ok'));
  } else {
    alert('Copy your challenge link:\n'+url);
  }
}


function checkChallengeParam(){
  const p=new URLSearchParams(window.location.search);
  const cId=p.get('c'),cScore=p.get('s'),cGrade=p.get('g'),cName=p.get('n');
  if(!cId||!cScore)return null;
  return {puzzleId:parseInt(cId),score:parseInt(cScore),grade:cGrade,name:decodeURIComponent(cName||'Someone'),time:parseInt(p.get('t')||0),groupId:p.get('grp')||null};
}

function checkChallengeWin(finalScore,elapsed,challenge){
  if(!challenge)return null;
  const scoreDiff=finalScore-challenge.score;
  const timeDiff=(challenge.time||0)-elapsed;
  const cM=Math.floor((challenge.time||0)/60),cS=(challenge.time||0)%60;
  const cT=challenge.time?(cM>0?`${cM}m ${cS}s`:`${cS}s`):'';
  const myM=Math.floor(elapsed/60),myS=elapsed%60;
  const myT=myM>0?`${myM}m ${myS}s`:`${elapsed}s`;
  if(scoreDiff>0) return `🎉 You beat ${challenge.name} by ${scoreDiff.toLocaleString()} pts!${timeDiff>0?' And you were faster 🔥':''}`;
  if(scoreDiff===0&&timeDiff>0) return `⏱ Same score but you were ${Math.abs(timeDiff)}s faster than ${challenge.name}! 🎉`;
  if(scoreDiff===0&&timeDiff===0) return `🤝 Dead heat with ${challenge.name}! Rematch?`;
  if(scoreDiff===0) return `😬 Same score as ${challenge.name} but they were faster (${cT} vs ${myT}) — rematch?`;
  return `😬 ${challenge.name} beats you by ${Math.abs(scoreDiff)} pts — ${cT?cT+' vs your '+myT+'.':''} Challenge back?`;
}

// ── HAPTICS & SOUND ──
function haptic(type){
  if(navigator.vibrate){
    if(type==='correct') navigator.vibrate([30,10,30]);
    else if(type==='wrong') navigator.vibrate(50);
    else if(type==='win') navigator.vibrate([50,30,50,30,100]);
    else if(type==='hint') navigator.vibrate(20);
  }
}

let audioCtx=null;
function playTone(freq,dur,type='sine',vol=0.12){
  try{
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
function soundCorrect(){playTone(523,0.1);setTimeout(()=>playTone(659,0.1),90);setTimeout(()=>playTone(784,0.18),180);}
function soundWrong(){playTone(180,0.12,'sawtooth',0.06);}
function soundWin(){[523,587,659,698,784,880].forEach((f,i)=>setTimeout(()=>playTone(f,0.18),i*70));}
function soundHint(){playTone(440,0.08,'sine',0.06);}
